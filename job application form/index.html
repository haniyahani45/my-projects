<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="box"><h1>JOB Application <span class="titlesmall">(web)</span></h1>
<form action="">
    <div class="formcontainer">
    <div class="formcontrol">
            <label for="firstname"> First Name</label>
            <input id="firstname" name="firstname" placeholder="enter your name">
        </div>
    <div class="formcontrol">
            <label for="lastname"> last Name</label>
            <input id="lastname" name="lastname" placeholder="enter your last name">
        </div>
    <div class="formcontrol">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter Your Email">
        </div>
    <div class="formcontrol">
            <label for="jobrole"> Job Role</label>
            <select id="jobrole" name="jobrole">     
            <option value="">Select job role</option>
            <option value="ui/ux designer"> UI/UX Designer</option>
            <option value="frontend"> Front End Developer</option>
            <option value="backend">Backend Developer</option>                
            </select> </div>
     <div class="textareacontrol">
                <label for="Address">Address</label>
                <textarea id="Address" name="Address" row="4" cols="50" placeholder="Enter Your Adress"></textarea></div>
    <div class="formcontrol">
                    <label for="city">city</label>
                    <input  id="city" name="city" placeholder="Enter Your city">
                </div>
    <div class="formcontrol">
                    <label for="pincode">Pin code</label>
                    <input type="number" id="pincode" name="pincode" placeholder="Enter Your city pincode">
                </div>
    <div class="formcontrol">
                    <label for="date">Date</label>
                    <input type="date" id="email" name="date">
                </div>
    <div class="formcontrol">
                    <label for="upload">Upload your CV</label>
                    <input type="file" id="upload" name="email" placeholder="Enter Your Email"></div>
            </div>
            <div class="button">
                <button type="submit"> Apply Now </button>
        </div>
    </div>
</form>

</div>
</body>
</html>
